apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: metering-otel-collector
  namespace: metering-thor
  labels:
    strimzi.io/cluster: metering
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
    - resource:
        type: topic
        name: billing-events
        patternType: literal
      operations: [Write, Describe]
    - resource:
        type: transactionalId
        name: otel-collector
        patternType: literal
      operations: [Describe, Write]
---
