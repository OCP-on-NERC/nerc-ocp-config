apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wasabi-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: nerc-cluster-secrets
    kind: ClusterSecretStore
  target:
    name: wasabi-creds
  dataFrom:
    # Wasabi backup target keys; fields: access_key_id, secret_access_key
    - extract:
        key: $ENV/$CLUSTER/wasabi-backup-bu
