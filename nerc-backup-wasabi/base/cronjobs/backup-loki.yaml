apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-loki
spec:
  schedule: "30 2 * * *"          # daily 02:30 UTC (after metrics)
  concurrencyPolicy: Forbid       # no parallel run (loki takes ~1h)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 43200   # 12h
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: rclone
            image: rclone/rclone:latest
            # NERC and Wasabi keys from Vault (ExternalSecrets nerc-s3-creds + wasabi-creds).
            # rclone.conf is built at runtime; no static key material.
            env:
            - name: NERC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nerc-s3-creds
                  key: endpoint
            - name: NERC_AK
              valueFrom:
                secretKeyRef:
                  name: nerc-s3-creds
                  key: access_key_id
            - name: NERC_SK
              valueFrom:
                secretKeyRef:
                  name: nerc-s3-creds
                  key: access_key_secret
            - name: WASABI_AK
              valueFrom:
                secretKeyRef:
                  name: wasabi-creds
                  key: access_key_id
            - name: WASABI_SK
              valueFrom:
                secretKeyRef:
                  name: wasabi-creds
                  key: secret_access_key
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -u
              CFG=/tmp/rclone.conf
              cat > "$CFG" <<RC
              [nerc]
              type = s3
              provider = Other
              endpoint = ${NERC_ENDPOINT}
              access_key_id = ${NERC_AK}
              secret_access_key = ${NERC_SK}

              [wasabi-us]
              type = s3
              provider = Wasabi
              endpoint = s3.wasabisys.com
              region = us-east-1
              access_key_id = ${WASABI_AK}
              secret_access_key = ${WASABI_SK}
              no_check_bucket = true
              RC
              # loki-logs is a LIVE bucket (audit/ rotates, grows). copy not sync,
              # one pass per job (no wrapper loop -> no runaway). high --transfers.
              DST=wasabi-us:nerc-loki-backup-bu
              RC=0
              for B in loki-logs loki-logs-test; do
                echo ">>> $B -> $DST/$B/ ($(date -u +%FT%TZ))"
                # --log-level NOTICE keeps only the final stats summary (no
                # per-object INFO lines), so /tmp/out.txt stays tiny even for
                # millions of objects. Output to a file (not a pipe) so rc
                # captures rclone (not tail), then pull the delta lines out.
                rclone copy "nerc:$B" "$DST/$B" \
                  --config "$CFG" \
                  --transfers 64 --checkers 96 --fast-list \
                  --retries 3 --low-level-retries 10 \
                  --ignore-errors \
                  --stats 300s --stats-log-level NOTICE --log-level NOTICE > /tmp/out.txt 2>&1
                rc=$?
                # delta of this bucket run (objects + bytes actually copied)
                grep -E "^Transferred:" /tmp/out.txt | tail -2 | sed "s/^/    delta: /"
                grep -E "^Errors:" /tmp/out.txt | tail -1 | sed "s/^/    /"
                # rclone exit 4 = non-fatal errors (e.g. transient 404 from
                # objects deleted at the source during the run; loki audit/
                # rotates constantly). With --ignore-errors the copy still
                # finishes; treat 4 as a warning, not a job failure. Only other
                # non-zero codes fail the job.
                if [ $rc -eq 4 ]; then
                  echo "    NOTE: $B rc=4 (non-fatal errors, see Errors above; source objects rotated)"
                elif [ $rc -ne 0 ]; then
                  echo "WARN: $B rc=$rc"; RC=1
                fi
              done
              echo "===== nerc-loki-backup ====="
              rclone size "$DST" --config "$CFG" 2>&1 | tail -2
              echo "Status: $([ $RC -eq 0 ] && echo ALLE OK || echo mit WARNUNGEN)"
              rm -f "$CFG" /tmp/out.txt
              exit $RC
