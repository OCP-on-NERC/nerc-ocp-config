apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-metrics
spec:
  schedule: "0 2 * * *"          # daily 02:00 UTC
  concurrencyPolicy: Forbid       # no parallel run
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 21600   # 6h
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: rclone
            image: rclone/rclone:latest
            # NERC and Wasabi keys from Vault (ExternalSecrets nerc-s3-creds + wasabi-creds).
            # rclone.conf is built at runtime; no static key material.
            env:
            - name: NERC_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nerc-s3-creds
                  key: endpoint
            - name: NERC_AK
              valueFrom:
                secretKeyRef:
                  name: nerc-s3-creds
                  key: access_key_id
            - name: NERC_SK
              valueFrom:
                secretKeyRef:
                  name: nerc-s3-creds
                  key: access_key_secret
            - name: WASABI_AK
              valueFrom:
                secretKeyRef:
                  name: wasabi-creds
                  key: access_key_id
            - name: WASABI_SK
              valueFrom:
                secretKeyRef:
                  name: wasabi-creds
                  key: secret_access_key
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -u
              CFG=/tmp/rclone.conf
              cat > "$CFG" <<RC
              [nerc]
              type = s3
              provider = Other
              endpoint = ${NERC_ENDPOINT}
              access_key_id = ${NERC_AK}
              secret_access_key = ${NERC_SK}

              [wasabi-us]
              type = s3
              provider = Wasabi
              endpoint = s3.wasabisys.com
              region = us-east-1
              access_key_id = ${WASABI_AK}
              secret_access_key = ${WASABI_SK}
              no_check_bucket = true
              RC
              DST=wasabi-us:nerc-metrics-backup-bu
              RC=0
              for B in acm-metrics acm-metrics-hypershift2 acm-metrics-test open-telemetry open-telemetry-test; do
                echo ">>> $B -> $DST/$B/ ($(date -u +%FT%TZ))"
                # --log-level NOTICE keeps only the final stats summary (no
                # per-object INFO lines), so /tmp/out.txt stays tiny even for
                # millions of objects. Output to a file (not a pipe) so rc
                # captures rclone (not tail), then pull the delta lines out.
                rclone copy "nerc:$B" "$DST/$B" \
                  --config "$CFG" \
                  --transfers 16 --checkers 32 --fast-list \
                  --retries 3 --low-level-retries 10 \
                  --ignore-errors \
                  --stats 60s --stats-log-level NOTICE --log-level NOTICE > /tmp/out.txt 2>&1
                rc=$?
                # delta of this bucket run (objects + bytes actually copied)
                grep -E "^Transferred:" /tmp/out.txt | tail -2 | sed "s/^/    delta: /"
                grep -E "^Errors:" /tmp/out.txt | tail -1 | sed "s/^/    /"
                # rclone exit 4 = non-fatal errors (e.g. transient 404 from
                # objects deleted at the source during the run). With
                # --ignore-errors the copy still finishes; treat 4 as a warning,
                # not a job failure. Only other non-zero codes fail the job.
                if [ $rc -eq 4 ]; then
                  echo "    NOTE: $B rc=4 (non-fatal errors, see Errors above; source objects rotated)"
                elif [ $rc -ne 0 ]; then
                  echo "WARN: $B rc=$rc"; RC=1
                fi
              done
              echo "===== nerc-metrics-backup ====="
              rclone size "$DST" --config "$CFG" 2>&1 | tail -2
              echo "Status: $([ $RC -eq 0 ] && echo ALLE OK || echo mit WARNUNGEN)"
              rm -f "$CFG" /tmp/out.txt
              exit $RC
