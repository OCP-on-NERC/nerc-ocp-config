apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: opentelemetry
  namespace: opentelemetry
spec:
  storageSize: 100Gi
  storage:
    secret:
      name: opentelemetry
      type: s3
    tls:
      enabled: true
  template:
    compactor:
      replicas: 3
    gateway:
      component:
        replicas: 3
      enabled: false
    distributor:
      component:
        replicas: 3
      tls:
        enabled: true
    ingester:
      replicas: 3
    querier:
      replicas: 3
    queryFrontend:
      component:
        replicas: 3
      jaegerQuery:
        enabled: true
        monitorTab:
          enabled: true
          prometheusEndpoint: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        ingress:
          route:
            termination: edge
          type: route
  resources:
    total:
      limits:
        memory: 4Gi
        cpu: 4
