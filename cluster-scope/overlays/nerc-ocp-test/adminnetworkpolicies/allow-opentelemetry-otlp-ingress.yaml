apiVersion: policy.networking.k8s.io/v1alpha1
kind: AdminNetworkPolicy
metadata:
  name: allow-opentelemetry-otlp-ingress
  labels:
    nerc.mghpcc.org/kustomized: "true"
spec:
  priority: 40
  subject:
    namespaces:
      matchLabels:
        kubernetes.io/metadata.name: opentelemetry
  ingress:
    # Workload pods in suhruth-test -> OTEL collector (OTLP)
    - action: Allow
      name: allow-otlp-from-suhruth-test
      ports:
        - portNumber:
            port: 4317
            protocol: TCP
        - portNumber:
            port: 4318
            protocol: TCP
      from:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: suhruth-test

    # OTEL collector -> Tempo distributor (same namespace)
    - action: Allow
      name: allow-otlp-within-opentelemetry
      ports:
        - portNumber:
            port: 4317
            protocol: TCP
        - portNumber:
            port: 4318
            protocol: TCP
      from:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: opentelemetry
