apiVersion: policy.networking.k8s.io/v1alpha1
kind: AdminNetworkPolicy
metadata:
  name: restrict-suhruth-test-egress
spec:
  priority: 50
  subject:
    pods:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: suhruth-test
      podSelector:
        matchLabels:
          app: openclaw
  egress:
  # Rule 1: allow DNS lookups to OpenShift DNS so pods can resolve hostnames.
  - name: "allow-dns"
    action: "Allow"
    to:
    - namespaces:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - portNumber:
        protocol: UDP
        port: 5353
    - portNumber:
        protocol: TCP
        port: 5353
  # Rule 2: allow HTTPS access to the Kubernetes API server for cluster API calls.
  - name: "allow-kube-api"
    action: "Allow"
    to:
    - pods:
        namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: default
        podSelector:
          matchLabels:
            component: apiserver
    ports:
    - portNumber:
        protocol: TCP
        port: 443
  # Rule 3: allow access to local LLM service within the same namespace.
  - name: "allow-local-llm"
    action: "Allow"
    to:
    - namespaces:
        matchLabels:
          kubernetes.io/metadata.name: suhruth-test
    ports:
    - portNumber:
        protocol: TCP
        port: 8443
  # Rule 4: deny all remaining IPv4 and IPv6 egress destinations not matched above.
  - name: "deny-all-other-egress"
    action: "Deny"
    to:
    - networks:
      - 0.0.0.0/0
      - ::/0
