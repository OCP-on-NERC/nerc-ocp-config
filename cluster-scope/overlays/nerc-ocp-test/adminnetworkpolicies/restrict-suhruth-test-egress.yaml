apiVersion: policy.networking.k8s.io/v1alpha1
kind: AdminNetworkPolicy
metadata:
  name: restrict-suhruth-test-egress
  labels:
    nerc.mghpcc.org/kustomized: "true"
spec:
  priority: 50
  subject:
    pods:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: suhruth-test
      podSelector:
        matchLabels:
          app: openclaw
  egress:
    # Rule 1: Allow DNS
    - action: Allow
      name: allow-dns
      ports:
        - portNumber:
            port: 5353
            protocol: UDP
        - portNumber:
            port: 5353
            protocol: TCP
        - portNumber:
            port: 53
            protocol: UDP
        - portNumber:
            port: 53
            protocol: TCP
      to:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns

    # Rule 2: Allow Kubernetes API (FIXED — use control plane node IPs + port 6443)
    - action: Allow
      name: allow-kube-api
      ports:
        - portNumber:
            port: 6443
            protocol: TCP
        - portNumber:
            port: 443
            protocol: TCP
      to:
        - networks:
            - 172.30.0.1/32    # Kubernetes API service ClusterIP
            - 10.30.8.23/32    # ctl-0
            - 10.30.8.24/32    # ctl-1
            - 10.30.8.25/32    # ctl-2

    # Rule 3: Allow intra-namespace traffic (vLLM kube-rbac-proxy)
    - action: Allow
      name: allow-local-llm
      ports:
        - portNumber:
            port: 8443
            protocol: TCP
      to:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: suhruth-test

    # Rule 3b: Allow Presidio services (PII detection for LiteLLM guardrails)
    # Note: Presidio uses port 3000 by default (not 5001/5002)
    - action: Allow
      name: allow-presidio
      ports:
        - portNumber:
            port: 3000
            protocol: TCP
      to:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: suhruth-test

    # Rule 4: Allow HTTPS egress
    # EgressFirewall (namespace-level) restricts which domains can be reached
    # AdminNetworkPolicy (pod-level) restricts which pods can make HTTPS requests
    - action: Allow
      name: allow-https-egress
      ports:
        - portNumber:
            port: 443
            protocol: TCP
      to:
        - networks:
            - 0.0.0.0/0

    # Rule 5: Deny everything else
    - action: Deny
      name: deny-all-other-egress
      to:
        - networks:
            - 0.0.0.0/0
            - "::/0"
