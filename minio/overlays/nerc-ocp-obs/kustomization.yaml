apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

configMapGenerator:
  - envs:
      - files/minio-config.env
    name: minio-config
    namespace: minio

patches:
  - path: externalsecrets/patch-minio-admin-credentials.yaml
  - path: persistentvolumeclaims/patch-pvc.yaml
