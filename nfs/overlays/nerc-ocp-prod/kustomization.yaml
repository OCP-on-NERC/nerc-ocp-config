apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
- patch: |
    - op: replace
      path: /spec/resources/requests/storage
      value: 25Ti
  target:
    kind: PersistentVolumeClaim
    name: nfs-server-root
labels:
- includeSelectors: true
  pairs:
    nerc.mghpcc.org/kustomized: "true"
